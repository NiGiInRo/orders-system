name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-order-service:
    name: Build Order Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test with Maven
        working-directory: order-service
        run: ./mvnw verify

      - name: Build Docker image
        working-directory: order-service
        run: docker build -t order-service:${{ github.sha }} .

  build-inventory-service:
    name: Build Inventory Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: inventory-service
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        working-directory: inventory-service
        run: pytest -v --cov=inventory_service --cov-config=.coveragerc --cov-fail-under=80

      - name: Build Docker image
        working-directory: inventory-service
        run: docker build -t inventory-service:${{ github.sha }} .
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-order-service:
    name: Build Order Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        working-directory: order-service
        run: ./mvnw verify -DskipTests